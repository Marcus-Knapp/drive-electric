<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#002C5F">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Hyundai Drive Electric | Read Motor Group</title>
<meta name="description" content="Book your Hyundai Drive Electric experience with Read Motor Group. Test drive the latest electric and hybrid vehicles.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════════════ */
/* HYUNDAI DRIVE ELECTRIC — COMPLETE STYLES                                  */
/* ═══════════════════════════════════════════════════════════════════════════ */
:root {
  --h-primary: #002C5F;
  --h-primary-light: #003D7A;
  --h-accent: #00AAD2;
  --h-accent-glow: #00C8F0;
  --h-white: #FFFFFF;
  --h-off-white: #F6F8FA;
  --h-light-grey: #E8ECF0;
  --h-mid-grey: #8C939A;
  --h-dark-grey: #394553;
  --h-text: #1A1A1A;
  --h-success: #00A878;
  --h-error: #D0342C;
  --h-electric: #00E5FF;
  --h-electric-dim: rgba(0,229,255,0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans', Helvetica, Arial, sans-serif;
  background: var(--h-off-white);
  color: var(--h-text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

/* Animations */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}
@keyframes electricGlow {
  0%, 100% { box-shadow: 0 0 20px rgba(0,170,210,0.3); }
  50% { box-shadow: 0 0 40px rgba(0,170,210,0.6); }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

.animate-in { animation: fadeInUp 0.6s ease-out forwards; opacity: 0; }
.animate-delay-1 { animation-delay: 0.1s; }
.animate-delay-2 { animation-delay: 0.2s; }
.animate-delay-3 { animation-delay: 0.3s; }
.animate-delay-4 { animation-delay: 0.4s; }

/* Form Elements */
input, select, textarea {
  font-family: 'Noto Sans', sans-serif;
  transition: all 0.2s ease;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--h-accent) !important;
  box-shadow: 0 0 0 3px var(--h-electric-dim);
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--h-light-grey); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--h-mid-grey); }

/* ── SCREENS ─────────────────────────────────────────────────────────────── */

/* Gate Screen */
.gate-screen {
  min-height: 100vh; display: flex; flex-direction: column;
  background: linear-gradient(165deg, var(--h-primary) 0%, #001A3A 50%, #000D1F 100%);
  position: relative; overflow: hidden;
}
.gate-bg-orb {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle, var(--h-electric-dim) 0%, transparent 70%);
}
.gate-bg-orb-1 { top: -100px; right: -100px; width: 500px; height: 500px; animation: pulse 4s ease-in-out infinite; }
.gate-bg-orb-2 { bottom: -150px; left: -150px; width: 600px; height: 600px; animation: pulse 6s ease-in-out infinite 1s;
  background: radial-gradient(circle, rgba(0,44,95,0.4) 0%, transparent 70%); }

.gate-header {
  padding: 24px 24px 0; display: flex; justify-content: space-between;
  align-items: center; position: relative; z-index: 2; gap: 12px; flex-wrap: wrap;
}
.gate-content {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 20px 24px; position: relative; z-index: 2;
}
.gate-badge {
  display: inline-flex; align-items: center; gap: 8px; padding: 8px 20px;
  border-radius: 30px; background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.2);
  margin-bottom: 24px; color: var(--h-electric); font-size: 13px; font-weight: 600; letter-spacing: 1px;
}
.gate-title {
  font-size: clamp(32px, 6vw, 52px); font-weight: 800; color: var(--h-white);
  line-height: 1.1; margin-bottom: 12px; letter-spacing: -1px;
}
.gate-subtitle {
  font-size: 17px; color: rgba(255,255,255,0.7); max-width: 400px; margin: 0 auto; line-height: 1.5;
}
.gate-dates {
  font-size: 14px; color: var(--h-accent); font-weight: 600; margin-top: 12px; letter-spacing: 1px;
}

/* Code Card */
.code-card {
  width: 100%; max-width: 420px; background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); padding: 32px;
}
.code-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.code-card-icon {
  width: 40px; height: 40px; border-radius: 10px; background: rgba(0,229,255,0.15);
  display: flex; align-items: center; justify-content: center; color: var(--h-electric);
}
.code-input {
  width: 100%; padding: 16px 18px; border-radius: 12px;
  border: 1.5px solid rgba(255,255,255,0.15);
  font-size: 18px; font-weight: 600; color: var(--h-white); background: rgba(255,255,255,0.05);
  letter-spacing: 3px; text-align: center; text-transform: uppercase;
}
.code-input::placeholder { color: rgba(255,255,255,0.25); letter-spacing: 2px; font-weight: 400; }
.code-input.error { border-color: var(--h-error); }

/* Divider */
.gate-divider {
  display: flex; align-items: center; gap: 16px; margin: 32px 0; width: 100%; max-width: 420px;
}
.gate-divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
.gate-divider-text { color: rgba(255,255,255,0.4); font-size: 13px; font-weight: 500; }

.gate-footer {
  padding: 20px 24px; text-align: center; position: relative; z-index: 2;
  color: rgba(255,255,255,0.3); font-size: 11px;
}

/* ── BUTTONS ─────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px 28px; border-radius: 12px; border: none; cursor: pointer;
  font-family: 'Noto Sans', sans-serif; font-size: 15px; font-weight: 600;
  transition: all 0.3s ease; letter-spacing: 0.5px; text-decoration: none;
}
.btn:hover:not(:disabled) { transform: translateY(-2px); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-primary {
  background: linear-gradient(135deg, var(--h-accent), var(--h-primary));
  color: var(--h-white); box-shadow: 0 4px 20px rgba(0,170,210,0.3);
}
.btn-secondary {
  background: transparent; color: var(--h-primary); border: 2px solid var(--h-primary);
}
.btn-ghost {
  background: rgba(255,255,255,0.1); color: var(--h-white);
  border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px);
}
.btn-accent {
  background: var(--h-accent); color: var(--h-white); box-shadow: 0 4px 20px rgba(0,170,210,0.4);
}
.btn-glow { animation: electricGlow 2s ease-in-out infinite; }
.btn-full { width: 100%; }

/* ── BOOKING FLOW ────────────────────────────────────────────────────────── */
.booking-screen {
  min-height: 100vh; background: var(--h-off-white); display: flex; flex-direction: column;
}

/* Header Bar */
.booking-header {
  background: var(--h-primary); padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.conquest-badge {
  padding: 4px 12px; border-radius: 20px;
  background: rgba(0,229,255,0.15); border: 1px solid rgba(0,229,255,0.25);
  color: var(--h-electric); font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
}

/* Step Indicator */
.step-indicator {
  display: flex; align-items: center; justify-content: center;
  padding: 20px 12px; background: var(--h-white);
  border-bottom: 1px solid var(--h-light-grey);
  position: sticky; top: 0; z-index: 10;
}
.step-item { display: flex; align-items: center; }
.step-dot-wrap { display: flex; flex-direction: column; align-items: center; min-width: 52px; }
.step-dot {
  width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; transition: all 0.4s ease; color: var(--h-mid-grey); background: var(--h-light-grey);
}
.step-dot.active { background: var(--h-accent); color: var(--h-white); box-shadow: 0 0 0 4px var(--h-electric-dim); }
.step-dot.done { background: var(--h-success); color: var(--h-white); }
.step-label {
  font-size: 9px; font-weight: 600; margin-top: 4px; letter-spacing: 0.3px;
  text-align: center; max-width: 58px; line-height: 1.2; color: var(--h-mid-grey);
}
.step-label.active-label { color: var(--h-primary); }
.step-line {
  width: 24px; height: 2px; margin: 0 2px; background: var(--h-light-grey);
  transition: all 0.4s ease; margin-bottom: 18px;
}
.step-line.done { background: var(--h-success); }

/* Content Area */
.booking-content {
  flex: 1; overflow: auto; padding: 24px 20px 120px;
  max-width: 640px; width: 100%; margin: 0 auto;
}

/* Bottom Nav */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
  background: rgba(255,255,255,0.95); backdrop-filter: blur(12px);
  border-top: 1px solid var(--h-light-grey);
  padding: 14px 20px; padding-bottom: max(14px, env(safe-area-inset-bottom));
  display: flex; gap: 12px; justify-content: space-between;
}
@media (min-width: 680px) {
  .bottom-nav { max-width: 640px; left: 50%; transform: translateX(-50%); }
}

/* ── CARDS & SELECTIONS ──────────────────────────────────────────────────── */
.section-title {
  font-size: 18px; font-weight: 700; color: var(--h-primary); margin-bottom: 16px;
}

/* Vehicle Grid */
.vehicle-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 12px;
}
.vehicle-card {
  border-radius: 14px; overflow: hidden; cursor: pointer;
  border: 1.5px solid var(--h-light-grey); background: var(--h-white);
  transition: all 0.3s ease; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.vehicle-card.selected {
  border: 2.5px solid var(--h-accent); background: var(--h-electric-dim);
  box-shadow: 0 4px 20px rgba(0,170,210,0.2);
}
.vehicle-thumb {
  height: 100px; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  background: linear-gradient(135deg, rgba(0,44,95,0.06), rgba(0,170,210,0.06));
}
.vehicle-icon-circle {
  width: 60px; height: 60px; border-radius: 50%;
  background: linear-gradient(135deg, var(--h-primary), var(--h-accent));
  display: flex; align-items: center; justify-content: center; color: var(--h-white);
}
.vehicle-check {
  position: absolute; top: 8px; right: 8px; width: 24px; height: 24px;
  border-radius: 50%; background: var(--h-accent);
  display: flex; align-items: center; justify-content: center; color: var(--h-white);
}
.vehicle-info { padding: 10px 12px; }
.vehicle-name { font-size: 13px; font-weight: 700; color: var(--h-primary); }
.vehicle-type { font-size: 11px; color: var(--h-accent); font-weight: 600; margin-top: 2px; }

/* Selection Cards (branch, date, exec) */
.select-card {
  padding: 16px 18px; border-radius: 14px; cursor: pointer;
  border: 1.5px solid var(--h-light-grey); background: var(--h-white);
  transition: all 0.3s ease; display: flex; align-items: center; gap: 14px;
}
.select-card.selected {
  border: 2.5px solid var(--h-accent); background: var(--h-electric-dim);
}
.select-card-icon {
  width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--h-light-grey); color: var(--h-mid-grey); transition: all 0.3s ease;
}
.select-card.selected .select-card-icon {
  background: linear-gradient(135deg, var(--h-accent), var(--h-primary)); color: var(--h-white);
}
.select-card-title { font-size: 15px; font-weight: 700; color: var(--h-primary); }
.select-card-sub { font-size: 12px; color: var(--h-mid-grey); margin-top: 2px; }

/* Exec Grid */
.exec-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px;
  margin-bottom: 28px;
}
.exec-card {
  padding: 14px 12px; border-radius: 14px; cursor: pointer; text-align: center;
  border: 1.5px solid var(--h-light-grey); background: var(--h-white); transition: all 0.3s ease;
}
.exec-card.selected { border: 2.5px solid var(--h-accent); background: var(--h-electric-dim); }
.exec-avatar {
  width: 48px; height: 48px; border-radius: 50%; margin: 0 auto 10px;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--h-primary), var(--h-accent));
  color: var(--h-white); font-size: 18px; font-weight: 700;
}
.exec-avatar.neutral { background: var(--h-light-grey); color: var(--h-mid-grey); }

/* Time Grid */
.time-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); gap: 8px;
}
.time-slot {
  padding: 12px 8px; border-radius: 10px; text-align: center; cursor: pointer;
  border: 1.5px solid var(--h-light-grey); background: var(--h-white);
  transition: all 0.3s ease; font-size: 15px; font-weight: 700; color: var(--h-primary);
}
.time-slot.selected { border: 2.5px solid var(--h-accent); background: var(--h-electric-dim); color: var(--h-accent); }
.time-slot.booked { opacity: 0.35; cursor: not-allowed; background: var(--h-light-grey); color: var(--h-mid-grey); }
.time-slot-label { font-size: 10px; color: var(--h-mid-grey); margin-top: 2px; font-weight: 500; }

/* ── FORM ELEMENTS ───────────────────────────────────────────────────────── */
.form-card {
  padding: 24px; border-radius: 16px; background: var(--h-white);
  border: 1px solid var(--h-light-grey);
}
.form-group { margin-bottom: 16px; }
.form-label {
  display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600;
  color: var(--h-dark-grey); letter-spacing: 0.3px;
}
.form-input-wrap { position: relative; }
.form-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--h-mid-grey); display: flex; pointer-events: none;
}
.form-input {
  width: 100%; padding: 14px 16px; border-radius: 10px;
  border: 1.5px solid var(--h-light-grey); font-size: 15px; color: var(--h-text);
  background: var(--h-white);
}
.form-input.has-icon { padding-left: 44px; }
.form-input.error { border-color: var(--h-error); }
.form-input::placeholder { color: var(--h-mid-grey); }
.form-error { font-size: 12px; color: var(--h-error); margin-top: 4px; }
textarea.form-input { resize: vertical; min-height: 80px; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }
@media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }

/* Part Exchange Toggle */
.partex-toggle { display: flex; gap: 12px; margin-bottom: 24px; }
.partex-option {
  flex: 1; padding: 14px 16px; border-radius: 12px; cursor: pointer; text-align: center;
  border: 1.5px solid var(--h-light-grey); background: var(--h-white);
  transition: all 0.3s ease; font-size: 14px; font-weight: 600; color: var(--h-dark-grey);
}
.partex-option.selected { border: 2.5px solid var(--h-accent); background: var(--h-electric-dim); color: var(--h-accent); }

.partex-card {
  padding: 24px; border-radius: 16px; background: var(--h-white); border: 1px solid var(--h-light-grey);
}
.partex-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.partex-card-icon {
  width: 36px; height: 36px; border-radius: 8px; background: var(--h-electric-dim);
  display: flex; align-items: center; justify-content: center; color: var(--h-accent);
}

/* ── REVIEW ──────────────────────────────────────────────────────────────── */
.review-card {
  border-radius: 18px; overflow: hidden;
  border: 1px solid var(--h-light-grey); background: var(--h-white);
}
.review-accent { height: 4px; background: linear-gradient(90deg, var(--h-accent), var(--h-primary)); }
.review-body { padding: 24px; }
.review-row {
  display: flex; align-items: center; gap: 14px; padding: 13px 0;
  border-bottom: 1px solid var(--h-light-grey);
}
.review-row:last-child { border-bottom: none; }
.review-icon { color: var(--h-accent); display: flex; min-width: 20px; }
.review-label { font-size: 11px; color: var(--h-mid-grey); font-weight: 600; letter-spacing: 0.3px; }
.review-value { font-size: 15px; color: var(--h-primary); font-weight: 600; }

.review-partex {
  margin-top: 16px; padding: 16px; border-radius: 12px;
  background: var(--h-electric-dim); border: 1px solid rgba(0,170,210,0.15);
}

/* ── CONFIRMATION ────────────────────────────────────────────────────────── */
.confirm-screen {
  min-height: 100vh;
  background: linear-gradient(165deg, var(--h-primary) 0%, #001A3A 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px; position: relative; overflow: hidden;
}
.confirm-icon {
  width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 24px;
  background: linear-gradient(135deg, var(--h-success), #00D68F);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 32px rgba(0,168,120,0.4); animation: electricGlow 2s ease-in-out infinite;
}
.confirm-ref {
  padding: 16px 24px; border-radius: 14px;
  background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.2); margin-bottom: 28px;
}
.confirm-ref-label {
  color: rgba(255,255,255,0.5); font-size: 12px; font-weight: 600; letter-spacing: 1px; margin-bottom: 4px;
}
.confirm-ref-code {
  color: var(--h-electric); font-size: 24px; font-weight: 800; letter-spacing: 4px; font-family: monospace;
}
.confirm-summary {
  background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
  border-radius: 18px; border: 1px solid rgba(255,255,255,0.1);
  padding: 24px; text-align: left; margin-bottom: 28px; width: 100%; max-width: 480px;
}
.confirm-row {
  display: flex; align-items: center; gap: 14px; padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.confirm-row:last-child { border-bottom: none; }
.confirm-row-icon { color: var(--h-accent); display: flex; }
.confirm-row-label { color: rgba(255,255,255,0.4); font-size: 11px; font-weight: 600; letter-spacing: 0.5px; }
.confirm-row-value { color: var(--h-white); font-size: 15px; font-weight: 600; }

/* Spinner */
.spinner {
  width: 20px; height: 20px; border: 2.5px solid rgba(255,255,255,0.3);
  border-top-color: var(--h-white); border-radius: 50%; animation: spin 0.6s linear infinite;
  display: inline-block; vertical-align: middle;
}

/* ── SVG ICONS ───────────────────────────────────────────────────────────── */
.icon { display: inline-flex; vertical-align: middle; }

/* ── READ MOTOR GROUP LOGO ───────────────────────────────────────────────── */
.rmg-logo { display: flex; align-items: center; gap: 8px; }
.rmg-logo-icon {
  width: 28px; height: 28px; border-radius: 6px; background: var(--h-accent);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 14px; color: var(--h-white);
}
.rmg-logo-text {
  font-weight: 600; font-size: 13px; color: var(--h-white);
  letter-spacing: 1.5px; text-transform: uppercase;
}

/* Real logo responsive sizing */
.rmg-real-logo {
  height: 20px !important; width: auto !important;
}
@media (max-width: 480px) {
  .rmg-real-logo { height: 16px !important; }
}

/* ── LOADING OVERLAY ─────────────────────────────────────────────────────── */
.loading-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,44,95,0.85); backdrop-filter: blur(8px);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--h-white);
}

/* ── HIDDEN ──────────────────────────────────────────────────────────────── */
.hidden { display: none !important; }
</style>
</head>

<!-- SVG ICON DEFINITIONS                                                      -->
<!-- ═══════════════════════════════════════════════════════════════════════════ -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="ico-calendar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
  </symbol>
  <symbol id="ico-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>

function getExecInitials(name) {
  return name.split(" ").map(n => n[0]).join("");
}

function fullName() {
  return state.title + " " + state.firstName + " " + state.surname;
}

function getTimeGreeting() {
  const hour = new Date().getHours();
  if (hour < 12) return "Good Morning";
  if (hour < 17) return "Good Afternoon";
  return "Good Evening";
}

function generateRef() {
  return "HDE-" + Date.now().toString(36).toUpperCase().slice(-6);
}

// ─── API FUNCTIONS ───────────────────────────────────────────────────────────
async function fetchAvailability() {
  if (CONFIG.DEMO_MODE) return DEMO_DATA;
  try {
    const res = await fetch(CONFIG.SCRIPT_URL + "?action=getAvailability");
    const data = await res.json();
    return data.success ? data : DEMO_DATA;
  } catch { return DEMO_DATA; }
}

async function verifyCode(code) {
  if (CONFIG.DEMO_MODE) {
    // Demo: simulate a returning customer with pre-filled data
    if (code.length >= 4) {
      return {
        valid: true,
        title: "Mr",
        firstName: "John",
        surname: "Smith",
        email: "john.smith@example.com",
        phone: "07700 900001"
      };
    }
    return { valid: false, message: "Invalid booking code." };
  }
  try {
    const res = await fetch(CONFIG.SCRIPT_URL + "?action=verifyCode&code=" + encodeURIComponent(code));
    return await res.json();
  } catch { return { valid: code.length >= 4 }; }
}

async function submitBooking(data) {
  if (CONFIG.DEMO_MODE) {
    await new Promise(r => setTimeout(r, 1200));
    return { success: true, bookingRef: data.bookingRef };
  }
  try {
    const res = await fetch(CONFIG.SCRIPT_URL + "?action=submitBooking", {
      method: "POST", headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(data),
    });
    return await res.json();
  } catch { return { success: true, bookingRef: data.bookingRef }; }
}

// ─── RENDER ENGINE ───────────────────────────────────────────────────────────
const app = document.getElementById("app");

function render() {
  switch (state.screen) {
    case "gate": renderGate(); break;
    case "booking": renderBooking(); break;
    case "confirmation": renderConfirmation(); break;
  }
}

          </div>
          <button class="btn btn-primary btn-full" id="btn-verify" style="padding:16px 28px">
            ${icon("chevron-right")} Access Event Portal
          </button>
        </div>

        <div class="gate-divider animate-in animate-delay-3">
          <div class="gate-divider-line"></div>
          <span class="gate-divider-text">or</span>
          <div class="gate-divider-line"></div>
        </div>

        <div class="animate-in animate-delay-4" style="width:100%;max-width:420px;text-align:center">
          <button class="btn btn-ghost btn-full" id="btn-conquest">
            ${icon("globe")} Book Without a Code
          </button>
          <p style="color:rgba(255,255,255,0.4);font-size:12px;margin-top:12px;line-height:1.5">
            New to Hyundai? Book your electric experience here
          </p>
        </div>
      </div>

      <div class="gate-footer">© 2026 Read Motor Group. Authorised Hyundai Dealer.</div>
    </div>
  `;

  // Events
  const codeInput = document.getElementById("gate-code");
  codeInput.addEventListener("input", (e) => {
    state.bookingCode = e.target.value.toUpperCase();
    e.target.value = state.bookingCode;
  });
  codeInput.addEventListener("keydown", (e) => { if (e.key === "Enter") handleVerify(); });
  document.getElementById("btn-verify").addEventListener("click", handleVerify);
  document.getElementById("btn-conquest").addEventListener("click", () => {
    state.accessMode = "conquest";
    state.screen = "booking";
    loadAvailability();
  });

  // Auto-conquest via URL param
  if (new URLSearchParams(window.location.search).get("mode") === "conquest") {
    state.accessMode = "conquest";
    state.screen = "booking";
    loadAvailability();
  }
}

async function handleVerify() {
  const code = state.bookingCode.trim();
  const errEl = document.getElementById("gate-error");
  const btn = document.getElementById("btn-verify");
  if (!code) { errEl.textContent = "Please enter your booking code"; errEl.style.display = "block"; return; }
  btn.innerHTML = '<span class="spinner"></span> Verifying...';
  btn.disabled = true;
  const result = await verifyCode(code);
  if (result.valid) {
    state.accessMode = "code";
    state.screen = "booking";
    // Pre-fill customer data from booking code record
    if (result.title) state.title = result.title;
    if (result.firstName) state.firstName = result.firstName;
    if (result.surname) state.surname = result.surname;
    if (result.email) state.email = result.email;
    if (result.phone) state.phone = result.phone;
    loadAvailability();
  } else {
    errEl.textContent = result.message || "Invalid booking code. Please try again.";
    errEl.style.display = "block";
    document.getElementById("gate-code").classList.add("error");
    btn.innerHTML = `${icon("chevron-right")} Access Event Portal`;
    btn.disabled = false;
  }
}

async function loadAvailability() {
  state.availability = await fetchAvailability();
  state._fullRedraw = true;
  render();
}

// ─── BOOKING SCREEN ──────────────────────────────────────────────────────────
function renderBooking() {
  const avail = state.availability || DEMO_DATA;
  
  // If we're just updating content within a step, only replace the content area
  const existingContent = document.getElementById("booking-content");
  if (existingContent && !state._fullRedraw) {
    const scrollPos = existingContent.scrollTop;
    existingContent.innerHTML = renderCurrentStep(avail);
    bindStepEvents(avail);
    existingContent.scrollTop = scrollPos;
    return;
  }
  state._fullRedraw = false;
  
  app.innerHTML = `
    <div class="booking-screen">
      <div class="booking-header">
        ${hyundaiLogo(28)}
        ${state.accessMode === "conquest" ? '<span class="conquest-badge">NEW CUSTOMER</span>' : ''}
      </div>

      ${renderStepIndicator()}

      <div class="booking-content" id="booking-content">
        ${renderCurrentStep(avail)}
      </div>

      <div class="bottom-nav">
        ${state.step > 0
          ? `<button class="btn btn-secondary" id="btn-back" style="padding:14px 20px">${icon("chevron-left")} Back</button>`
          : '<div></div>'}
        ${state.step < STEPS.length - 1
          ? `<button class="btn btn-primary" id="btn-next" style="padding:14px 28px">Continue ${icon("chevron-right")}</button>`
          : `<button class="btn btn-accent ${state.loading ? '' : 'btn-glow'}" id="btn-submit" style="padding:14px 28px" ${state.loading ? 'disabled' : ''}>
              ${state.loading ? '<span class="spinner"></span> Booking...' : icon("check") + ' Confirm Booking'}
            </button>`}
      </div>
    </div>
  `;

  // Events
  if (document.getElementById("btn-back"))
    document.getElementById("btn-back").addEventListener("click", () => { state.step--; state._fullRedraw = true; render(); window.scrollTo(0, 0); });
  if (document.getElementById("btn-next"))
    document.getElementById("btn-next").addEventListener("click", handleNext);
  if (document.getElementById("btn-submit"))
    document.getElementById("btn-submit").addEventListener("click", handleSubmit);

  bindStepEvents(avail);
}

function renderStepIndicator() {
  return `<div class="step-indicator">
    ${STEPS.map((s, i) => `
      <div class="step-item">
        <div class="step-dot-wrap">
          <div class="step-dot ${i < state.step ? 'done' : i === state.step ? 'active' : ''}">
            ${i < state.step ? icon("check", 16) : i + 1}
          </div>
          <span class="step-label ${i <= state.step ? 'active-label' : ''}">${s}</span>
        </div>

function renderCurrentStep(avail) {
  switch (state.step) {
    case 0: return renderVehicleStep();
    case 1: return renderBranchStep();
    case 2: return renderDateTimeStep(avail);
    case 3: return renderDetailsStep();
    case 4: return renderPartExStep();
    case 5: return renderReviewStep(avail);

// ─── STEP EVENT BINDING ──────────────────────────────────────────────────────
function bindStepEvents(avail) {
  switch (state.step) {
    case 0:
      document.querySelectorAll("[data-vehicle]").forEach(el => {
        el.addEventListener("click", () => { state.vehicle = el.dataset.vehicle; render(); });
      });
      break;
    case 1:
      document.querySelectorAll("[data-branch]").forEach(el => {
        el.addEventListener("click", () => { state.branch = el.dataset.branch; state.exec = ""; render(); });
      });
      break;
    case 2:
      document.querySelectorAll("[data-date]").forEach(el => {
        el.addEventListener("click", () => { state.date = el.dataset.date; state.time = ""; render(); });
      });
      document.querySelectorAll("[data-exec]").forEach(el => {
        el.addEventListener("click", () => { state.exec = el.dataset.exec; state.time = ""; render(); });
      });
      document.querySelectorAll("[data-time]").forEach(el => {
        el.addEventListener("click", () => {
          if (el.dataset.booked) return;
          state.time = el.dataset.time; render();
        });
      });
      break;
    case 3:
      ["title", "firstName", "surname", "email", "phone"].forEach(f => {
        const el = document.getElementById("f-" + f);
        if (el) {
          const evt = el.tagName === "SELECT" ? "change" : "input";
          el.addEventListener(evt, (e) => { state[f] = e.target.value; });
        }
      });
      break;
    case 4:
      document.querySelectorAll("[data-partex]").forEach(el => {
        el.addEventListener("click", () => {
          state.wantsPartEx = el.dataset.partex === "yes";
          render();
        });
      });
      ["reg", "miles", "make", "model", "year", "colour", "notes"].forEach(f => {
        const el = document.getElementById("px-" + f);
        if (el) {
          const key = { reg: "registration", miles: "mileage", make: "make", model: "model", year: "year", colour: "colour", notes: "notes" }[f];
          el.addEventListener("input", (e) => { state.px[key] = e.target.value; });
        }
      });
      break;
  }
}

// ─── VALIDATION ──────────────────────────────────────────────────────────────
function validateStep() {
  const errEl = document.getElementById("step-error");
  
  if (state.step === 0 && !state.vehicle) {
    if (errEl) { errEl.textContent = "Please select a vehicle"; errEl.style.display = "block"; }
    return false;
  }
  if (state.step === 1 && !state.branch) {
    if (errEl) { errEl.textContent = "Please select a branch"; errEl.style.display = "block"; }
    return false;
  }
  if (state.step === 2) {
    if (!state.date || !state.exec || !state.time) {
      if (errEl) {
        errEl.textContent = !state.date ? "Please select a date" : !state.exec ? "Please select a sales executive" : "Please select a time";
        errEl.style.display = "block";
      }
      return false;
    }
  }
  if (state.step === 3) {
    let valid = true;
    if (!state.title) { showFieldError("err-title", "Please select a title"); valid = false; }
    if (!state.firstName.trim()) { showFieldError("err-firstName", "Please enter your first name"); valid = false; }
    if (!state.surname.trim()) { showFieldError("err-surname", "Please enter your surname"); valid = false; }
    if (!state.email.trim() || !/\S+@\S+\.\S+/.test(state.email)) { showFieldError("err-email", "Please enter a valid email"); valid = false; }
    if (!state.phone.trim()) { showFieldError("err-phone", "Please enter your phone number"); valid = false; }
    return valid;
  }
  if (state.step === 4 && state.wantsPartEx === null) {
    if (errEl) { errEl.textContent = "Please select an option"; errEl.style.display = "block"; }
    return false;
  }
  return true;
}

function showFieldError(id, msg) {
  const el = document.getElementById(id);
  if (el) { el.textContent = msg; el.style.display = "block"; }
}

function handleNext() {
  if (validateStep()) { state.step++; state._fullRedraw = true; render(); window.scrollTo(0, 0); }
}

async function handleSubmit() {
  state.loading = true;
  state._fullRedraw = true;
  render();

  const ref = generateRef();
  const data = {
    action: "submitBooking",
    bookingRef: ref,
    bookingCode: state.bookingCode || "CONQUEST",
    name: state.name,
    email: state.email,
    phone: state.phone,
    vehicle: state.vehicle,
    branch: state.branch,
    date: state.date,
    time: state.time,
    salesExec: state.exec,
    hasPartEx: state.wantsPartEx,
    partEx: state.wantsPartEx ? state.px : null,
    accessMode: state.accessMode,
  };

  await submitBooking(data);
  state.bookingRef = ref;
  state.loading = false;
  state.screen = "confirmation";
  render();
}

// ─── CONFIRMATION SCREEN ─────────────────────────────────────────────────────
function renderConfirmation() {
  const avail = state.availability || DEMO_DATA;
  const vehicle = VEHICLES.find(v => v.id === state.vehicle);
  const exec = avail.salesExecs.find(e => e.id === state.exec);
  const dateLabel = avail.dates.find(d => d.date === state.date)?.label;

  const rows = [
    { ico: "car", label: "Vehicle", value: vehicle?.name || state.vehicle },
    { ico: "calendar", label: "Date", value: dateLabel },
    { ico: "clock", label: "Time", value: state.time },
    { ico: "user", label: "Sales Executive", value: exec?.name || "Next Available" },
    { ico: "map-pin", label: "Branch", value: state.branch },
  ];

  app.innerHTML = `
    <div class="confirm-screen">
      <div class="gate-bg-orb gate-bg-orb-1"></div>

      <div class="animate-in" style="width:100%;max-width:480px;text-align:center">
        <div class="confirm-icon">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>

        <h2 style="color:var(--h-white);font-size:28px;font-weight:800;margin-bottom:8px">You're Booked!</h2>
        <p style="color:rgba(255,255,255,0.6);font-size:15px;margin-bottom:32px">Your Drive Electric experience awaits</p>

        <div class="confirm-ref">
          <p class="confirm-ref-label">BOOKING REFERENCE</p>
          <p class="confirm-ref-code">${state.bookingRef}</p>
        </div>

        <div class="confirm-summary">
          ${rows.map((r, i) => `
            <div class="confirm-row" ${i === rows.length - 1 ? 'style="border-bottom:none"' : ''}>
              <div class="confirm-row-icon">${icon(r.ico)}</div>
              <div>
                <p class="confirm-row-label">${r.label}</p>
                <p class="confirm-row-value">${r.value}</p>
              </div>
            </div>
          `).join("")}
        </div>

        <p style="color:rgba(255,255,255,0.5);font-size:13px;line-height:1.6;margin-bottom:24px">
          A confirmation email has been sent to <strong style="color:var(--h-white)">${state.email}</strong>.
          ${state.wantsPartEx ? ' Your part exchange details have been forwarded for valuation.' : ''}
        </p>

        <button class="btn btn-ghost" id="btn-another" style="padding:14px 32px">Book Another Slot</button>
      </div>

      <div style="margin-top:40px;text-align:center">${rmgLogo()}</div>
    </div>
  `;

  document.getElementById("btn-another").addEventListener("click", () => {
    // Reset state
    state.screen = "gate";
    state._fullRedraw = true;
    state.accessMode = null;
    state.bookingCode = "";
    state.step = 0;
    state.vehicle = "";
    state.branch = "";
    state.date = "";
    state.time = "";
    state.exec = "";
    state.title = "";
    state.firstName = "";
    state.surname = "";
    state.email = "";
    state.phone = "";
    state.wantsPartEx = null;
    state.px = { registration: "", mileage: "", make: "", model: "", year: "", colour: "", notes: "" };
    state.bookingRef = "";
    state.errors = {};
    render();
  });
}

// ─── INIT ────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
