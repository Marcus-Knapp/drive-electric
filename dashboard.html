<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drive Electric — Management Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #002C5F;
  --primary-light: #003D7A;
  --accent: #00AAD2;
  --electric: #00E5FF;
  --white: #FFFFFF;
  --off-white: #F6F8FA;
  --light-grey: #E8ECF0;
  --mid-grey: #8C939A;
  --dark-grey: #394553;
  --text: #1A1A1A;
  --success: #00A878;
  --warning: #F59E0B;
  --error: #D0342C;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans', sans-serif; background: var(--off-white);
  color: var(--text); -webkit-font-smoothing: antialiased;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
.fade-in { animation: fadeIn 0.4s ease-out forwards; opacity: 0; }
.d1 { animation-delay: 0.05s; } .d2 { animation-delay: 0.1s; } .d3 { animation-delay: 0.15s; }
.d4 { animation-delay: 0.2s; } .d5 { animation-delay: 0.25s; } .d6 { animation-delay: 0.3s; }

/* Header */
.header {
  background: linear-gradient(135deg, var(--primary), #001A3A);
  padding: 24px 32px; display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 16px;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.header h1 { color: var(--white); font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
.header-badge {
  display: inline-flex; align-items: center; gap: 6px; padding: 5px 14px;
  border-radius: 20px; background: rgba(0,229,255,0.12); border: 1px solid rgba(0,229,255,0.25);
  color: var(--electric); font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
}
.header-right { display: flex; align-items: center; gap: 12px; }
.refresh-btn {
  padding: 8px 18px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08); color: var(--white); font-size: 13px;
  font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.refresh-btn:hover { background: rgba(255,255,255,0.15); }
.last-updated { color: rgba(255,255,255,0.5); font-size: 11px; }

/* Main Layout */
.main { max-width: 1400px; margin: 0 auto; padding: 24px; }

/* KPI Cards */
.kpi-row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.kpi-card {
  background: var(--white); border-radius: 14px; padding: 22px;
  border: 1px solid var(--light-grey); position: relative; overflow: hidden;
}
.kpi-card::after {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
}
.kpi-card.blue::after { background: var(--accent); }
.kpi-card.green::after { background: var(--success); }
.kpi-card.amber::after { background: var(--warning); }
.kpi-card.red::after { background: var(--error); }
.kpi-label { font-size: 12px; font-weight: 600; color: var(--mid-grey); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
.kpi-value { font-size: 36px; font-weight: 800; color: var(--primary); line-height: 1; margin-bottom: 4px; }
.kpi-sub { font-size: 13px; color: var(--mid-grey); }

/* Charts Row */
.charts-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;
}
@media (max-width: 900px) { .charts-row { grid-template-columns: 1fr; } }

/* Card */
.card {
  background: var(--white); border-radius: 14px; padding: 24px;
  border: 1px solid var(--light-grey);
}
.card-title {
  font-size: 16px; font-weight: 700; color: var(--primary); margin-bottom: 18px;
  display: flex; align-items: center; gap: 8px;
}
.card-title svg { color: var(--accent); }

/* Bar Chart */
.bar-chart { display: flex; flex-direction: column; gap: 10px; }
.bar-row { display: flex; align-items: center; gap: 12px; }
.bar-label { width: 110px; font-size: 13px; font-weight: 600; color: var(--dark-grey); text-align: right; flex-shrink: 0; }
.bar-track { flex: 1; height: 28px; background: var(--off-white); border-radius: 6px; overflow: hidden; position: relative; }
.bar-fill {
  height: 100%; border-radius: 6px; transition: width 0.8s ease-out;
  display: flex; align-items: center; padding: 0 10px; min-width: 40px;
}
.bar-fill span { font-size: 12px; font-weight: 700; color: var(--white); white-space: nowrap; }
.bar-fill.blue { background: linear-gradient(90deg, var(--accent), var(--primary)); }
.bar-fill.green { background: linear-gradient(90deg, var(--success), #00796B); }
.bar-fill.amber { background: linear-gradient(90deg, var(--warning), #D97706); }

/* Table */
.table-wrap { overflow-x: auto; margin-top: 8px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  text-align: left; padding: 10px 14px; font-weight: 700; font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.5px; color: var(--mid-grey);
  border-bottom: 2px solid var(--light-grey); position: sticky; top: 0;
  background: var(--white); white-space: nowrap;
}
tbody td {
  padding: 10px 14px; border-bottom: 1px solid var(--light-grey);
  color: var(--dark-grey); white-space: nowrap;
}
tbody tr:hover { background: rgba(0,170,210,0.04); }
.badge {
  display: inline-block; padding: 3px 10px; border-radius: 12px;
  font-size: 11px; font-weight: 700;
}
.badge-invited { background: rgba(0,170,210,0.12); color: var(--accent); }
.badge-conquest { background: rgba(0,168,120,0.12); color: var(--success); }
.badge-yes { background: rgba(245,158,11,0.12); color: #B45309; }
.badge-no { background: var(--off-white); color: var(--mid-grey); }

/* Filter bar */
.filter-bar {
  display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center;
}
.filter-select {
  padding: 8px 14px; border-radius: 8px; border: 1.5px solid var(--light-grey);
  font-family: 'Noto Sans', sans-serif; font-size: 13px; font-weight: 600;
  color: var(--dark-grey); background: var(--white); cursor: pointer;
}
.filter-select:focus { outline: none; border-color: var(--accent); }

/* Loading */
.loading-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 60vh; gap: 16px;
}
.spinner {
  width: 36px; height: 36px; border: 3px solid var(--light-grey);
  border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Capacity grid */
.capacity-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px;
}
.capacity-cell {
  padding: 14px; border-radius: 10px; text-align: center;
  border: 1px solid var(--light-grey); background: var(--white);
}
.capacity-date { font-size: 12px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
.capacity-pct { font-size: 28px; font-weight: 800; line-height: 1; margin-bottom: 2px; }
.capacity-detail { font-size: 11px; color: var(--mid-grey); }
.pct-low { color: var(--success); }
.pct-mid { color: var(--warning); }
.pct-high { color: var(--error); }

/* Exec leaderboard */
.exec-row {
  display: flex; align-items: center; gap: 14px; padding: 12px 0;
  border-bottom: 1px solid var(--light-grey);
}
.exec-row:last-child { border-bottom: none; }
.exec-rank {
  width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 12px; font-weight: 800;
  background: var(--off-white); color: var(--mid-grey); flex-shrink: 0;
}
.exec-rank.top { background: linear-gradient(135deg, var(--accent), var(--primary)); color: var(--white); }
.exec-info { flex: 1; }
.exec-name { font-size: 14px; font-weight: 700; color: var(--primary); }
.exec-branch { font-size: 11px; color: var(--mid-grey); }
.exec-count { font-size: 20px; font-weight: 800; color: var(--accent); }
</style>
</head>
<body>

<div id="app">
  <div class="loading-screen">
    <div class="spinner"></div>
    <p style="color:var(--mid-grey);font-size:14px">Loading dashboard...</p>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// CONFIGURATION — Update this with your Google Apps Script Web App URL
// ═══════════════════════════════════════════════════════════════════════════════
const CONFIG = {
  SCRIPT_URL: "https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID_HERE/exec",
  DEMO_MODE: true, // Set to false once connected to Google Sheets
};

// Demo data for testing
const DEMO_BOOKINGS = [
  { timestamp:"01/04/2026 09:15", booking_ref:"HDE-A1B2C3", booking_code:"HDE-2026-0001", title:"Mr", first_name:"John", surname:"Smith", full_name:"Mr John Smith", email:"john@email.com", phone:"07700900001", vehicle:"IONIQ 5", branch:"Read Hyundai Kings Lynn", date:"2026-06-05", time:"09:00", sales_exec:"Sales Exec 1", access_mode:"code", part_ex_yn:"Yes", px_registration:"AB12CDE", px_mileage:"35000", px_make:"Ford", px_model:"Focus", px_year:"2020", px_colour:"Blue", px_notes:"" },
  { timestamp:"01/04/2026 10:30", booking_ref:"HDE-D3E4F5", booking_code:"CONQUEST", title:"Mrs", first_name:"Jane", surname:"Doe", full_name:"Mrs Jane Doe", email:"jane@email.com", phone:"07700900002", vehicle:"KONA EV", branch:"Read Hyundai Boston", date:"2026-06-05", time:"10:30", sales_exec:"Sales Exec 3", access_mode:"conquest", part_ex_yn:"No", px_registration:"", px_mileage:"", px_make:"", px_model:"", px_year:"", px_colour:"", px_notes:"" },
  { timestamp:"01/04/2026 11:00", booking_ref:"HDE-G6H7I8", booking_code:"HDE-2026-0003", title:"Mr", first_name:"David", surname:"Wilson", full_name:"Mr David Wilson", email:"david@email.com", phone:"07700900003", vehicle:"IONIQ 6 N", branch:"Read Hyundai Lincoln", date:"2026-06-06", time:"12:00", sales_exec:"Sales Exec 5", access_mode:"code", part_ex_yn:"Yes", px_registration:"XY63FGH", px_mileage:"28000", px_make:"Hyundai", px_model:"Tucson", px_year:"2021", px_colour:"Silver", px_notes:"Full service history" },
  { timestamp:"01/04/2026 14:20", booking_ref:"HDE-J9K0L1", booking_code:"CONQUEST", title:"Ms", first_name:"Sarah", surname:"Brown", full_name:"Ms Sarah Brown", email:"sarah@email.com", phone:"07700900004", vehicle:"INSTER", branch:"Read Hyundai Kings Lynn", date:"2026-06-06", time:"13:30", sales_exec:"Sales Exec 2", access_mode:"conquest", part_ex_yn:"No", px_registration:"", px_mileage:"", px_make:"", px_model:"", px_year:"", px_colour:"", px_notes:"" },
  { timestamp:"02/04/2026 08:45", booking_ref:"HDE-M2N3O4", booking_code:"HDE-2026-0005", title:"Dr", first_name:"Robert", surname:"Taylor", full_name:"Dr Robert Taylor", email:"robert@email.com", phone:"07700900005", vehicle:"IONIQ 9", branch:"Read Hyundai Worksop", date:"2026-06-07", time:"09:00", sales_exec:"Sales Exec 7", access_mode:"code", part_ex_yn:"Yes", px_registration:"LM19PQR", px_mileage:"42000", px_make:"BMW", px_model:"3 Series", px_year:"2019", px_colour:"Black", px_notes:"Minor scratch on bumper" },
  { timestamp:"02/04/2026 09:30", booking_ref:"HDE-P5Q6R7", booking_code:"CONQUEST", title:"Mr", first_name:"Michael", surname:"Lee", full_name:"Mr Michael Lee", email:"michael@email.com", phone:"07700900006", vehicle:"TUCSON Plug-in Hybrid", branch:"Read Hyundai Burton", date:"2026-06-05", time:"15:00", sales_exec:"Sales Exec 9", access_mode:"conquest", part_ex_yn:"No", px_registration:"", px_mileage:"", px_make:"", px_model:"", px_year:"", px_colour:"", px_notes:"" },
  { timestamp:"02/04/2026 12:15", booking_ref:"HDE-S8T9U0", booking_code:"HDE-2026-0007", title:"Mrs", first_name:"Emma", surname:"Clark", full_name:"Mrs Emma Clark", email:"emma@email.com", phone:"07700900007", vehicle:"IONIQ 5 N", branch:"Read Hyundai Lincoln", date:"2026-06-08", time:"10:30", sales_exec:"Sales Exec 6", access_mode:"code", part_ex_yn:"Yes", px_registration:"NO21VWX", px_mileage:"18000", px_make:"Nissan", px_model:"Leaf", px_year:"2021", px_colour:"White", px_notes:"" },
  { timestamp:"02/04/2026 15:00", booking_ref:"HDE-V1W2X3", booking_code:"CONQUEST", title:"Mr", first_name:"James", surname:"Harris", full_name:"Mr James Harris", email:"james@email.com", phone:"07700900008", vehicle:"KONA EV", branch:"Read Hyundai Boston", date:"2026-06-07", time:"15:00", sales_exec:"Sales Exec 4", access_mode:"conquest", part_ex_yn:"No", px_registration:"", px_mileage:"", px_make:"", px_model:"", px_year:"", px_colour:"", px_notes:"" },
  { timestamp:"03/04/2026 07:45", booking_ref:"HDE-Y4Z5A6", booking_code:"HDE-2026-0009", title:"Miss", first_name:"Lucy", surname:"Walker", full_name:"Miss Lucy Walker", email:"lucy@email.com", phone:"07700900009", vehicle:"IONIQ 6", branch:"Read Hyundai Worksop", date:"2026-06-06", time:"16:30", sales_exec:"Sales Exec 8", access_mode:"code", part_ex_yn:"No", px_registration:"", px_mileage:"", px_make:"", px_model:"", px_year:"", px_colour:"", px_notes:"" },
  { timestamp:"03/04/2026 10:20", booking_ref:"HDE-B7C8D9", booking_code:"CONQUEST", title:"Mr", first_name:"Tom", surname:"Evans", full_name:"Mr Tom Evans", email:"tom@email.com", phone:"07700900010", vehicle:"SANTA FE Plug-in Hybrid", branch:"Read Hyundai Kings Lynn", date:"2026-06-08", time:"12:00", sales_exec:"Sales Exec 1", access_mode:"conquest", part_ex_yn:"Yes", px_registration:"PQ22STU", px_mileage:"55000", px_make:"Kia", px_model:"Sportage", px_year:"2018", px_colour:"Grey", px_notes:"Needs new tyres" },
];

const DEMO_AVAILABILITY = {
  dates: [
    { date: "2026-06-05", label: "Friday 5th June" },
    { date: "2026-06-06", label: "Saturday 6th June" },
    { date: "2026-06-07", label: "Sunday 7th June" },
    { date: "2026-06-08", label: "Monday 8th June" },
  ],
  timeSlots: ["09:00","10:30","12:00","13:30","15:00","16:30"],
  salesExecs: [
    { id:"se1", name:"Sales Exec 1", branch:"Read Hyundai Kings Lynn" },
    { id:"se2", name:"Sales Exec 2", branch:"Read Hyundai Kings Lynn" },
    { id:"se3", name:"Sales Exec 3", branch:"Read Hyundai Boston" },
    { id:"se4", name:"Sales Exec 4", branch:"Read Hyundai Boston" },
    { id:"se5", name:"Sales Exec 5", branch:"Read Hyundai Lincoln" },
    { id:"se6", name:"Sales Exec 6", branch:"Read Hyundai Lincoln" },
    { id:"se7", name:"Sales Exec 7", branch:"Read Hyundai Worksop" },
    { id:"se8", name:"Sales Exec 8", branch:"Read Hyundai Worksop" },
    { id:"se9", name:"Sales Exec 9", branch:"Read Hyundai Burton" },
    { id:"se10", name:"Sales Exec 10", branch:"Read Hyundai Burton" },
  ],
};

const BRANCHES = ["Read Hyundai Kings Lynn","Read Hyundai Boston","Read Hyundai Lincoln","Read Hyundai Worksop","Read Hyundai Burton"];

// ─── STATE ───────────────────────────────────────────────────────────────────
let reportData = null;
let filterBranch = "all";

// ─── FETCH DATA ──────────────────────────────────────────────────────────────
async function loadData() {
  if (CONFIG.DEMO_MODE) {
    reportData = { bookings: DEMO_BOOKINGS, ...DEMO_AVAILABILITY };
    render();
    return;
  }
  try {
    const res = await fetch(CONFIG.SCRIPT_URL + "?action=getReportData");
    const data = await res.json();
    if (data.success) {
      reportData = data;
      render();
    }
  } catch(e) {
    reportData = { bookings: DEMO_BOOKINGS, ...DEMO_AVAILABILITY };
    render();
  }
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function count(arr, fn) { return arr.filter(fn).length; }
function pct(n, total) { return total ? Math.round((n/total)*100) : 0; }
function shortBranch(b) { return b.replace("Read Hyundai ", ""); }

function getFilteredBookings() {
  if (!reportData) return [];
  if (filterBranch === "all") return reportData.bookings;
  return reportData.bookings.filter(b => b.branch === filterBranch);
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const bookings = getFilteredBookings();
  const allBookings = reportData.bookings;
  const totalSlots = (reportData.dates?.length || 4) * (reportData.timeSlots?.length || 6) * (reportData.salesExecs?.length || 10);
  const filteredExecs = filterBranch === "all"
    ? (reportData.salesExecs || [])
    : (reportData.salesExecs || []).filter(e => e.branch === filterBranch);
  const filteredSlots = (reportData.dates?.length || 4) * (reportData.timeSlots?.length || 6) * filteredExecs.length;

  const totalBookings = bookings.length;
  const conquestCount = count(bookings, b => b.access_mode === "conquest");
  const invitedCount = count(bookings, b => b.access_mode === "code");
  const partExCount = count(bookings, b => b.part_ex_yn === "Yes");
  const capacityPct = pct(totalBookings, filteredSlots);

  // Bookings by branch
  const byBranch = {};
  BRANCHES.forEach(b => byBranch[b] = 0);
  allBookings.forEach(b => { if (byBranch[b.branch] !== undefined) byBranch[b.branch]++; });
  const maxBranch = Math.max(...Object.values(byBranch), 1);

  // Bookings by vehicle
  const byVehicle = {};
  bookings.forEach(b => { byVehicle[b.vehicle] = (byVehicle[b.vehicle]||0) + 1; });
  const vehicleSorted = Object.entries(byVehicle).sort((a,b) => b[1]-a[1]);
  const maxVehicle = Math.max(...vehicleSorted.map(v=>v[1]), 1);

  // Bookings by exec
  const byExec = {};
  bookings.forEach(b => {
    if (b.sales_exec) {
      if (!byExec[b.sales_exec]) {
        const execInfo = (reportData.salesExecs||[]).find(e => e.name === b.sales_exec || e.id === b.sales_exec);
        byExec[b.sales_exec] = { count: 0, branch: execInfo ? execInfo.branch : "" };
      }
      byExec[b.sales_exec].count++;
    }
  });
  const execSorted = Object.entries(byExec).sort((a,b) => b[1].count - a[1].count);

  // Capacity by date
  const slotsPerDate = (reportData.timeSlots?.length || 6) * filteredExecs.length;
  const byDate = {};
  (reportData.dates||[]).forEach(d => byDate[d.date] = { label: d.label, booked: 0, total: slotsPerDate });
  bookings.forEach(b => { if (byDate[b.date]) byDate[b.date].booked++; });

  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="header">
      <div class="header-left">
        <div>
          <h1>Drive Electric Dashboard</h1>
          <span class="last-updated">Last updated: ${new Date().toLocaleString("en-GB")}</span>
        </div>
        <span class="header-badge">5–8 JUNE 2026</span>
      </div>
      <div class="header-right">
        <button class="refresh-btn" id="btn-refresh">↻ Refresh Data</button>
      </div>
    </div>

    <div class="main">
      <!-- Filters -->
      <div class="filter-bar fade-in">
        <span style="font-size:13px;font-weight:700;color:var(--primary)">Filter by site:</span>
        <select class="filter-select" id="filter-branch">
          <option value="all" ${filterBranch==="all"?"selected":""}>All Sites</option>
          ${BRANCHES.map(b => `<option value="${b}" ${filterBranch===b?"selected":""}>${shortBranch(b)}</option>`).join("")}
        </select>
      </div>

      <!-- KPI Cards -->
      <div class="kpi-row">
        <div class="kpi-card blue fade-in d1">
          <div class="kpi-label">Total Bookings</div>
          <div class="kpi-value">${totalBookings}</div>
          <div class="kpi-sub">${filterBranch==="all"?"Across all sites":shortBranch(filterBranch)}</div>
        </div>
        <div class="kpi-card green fade-in d2">
          <div class="kpi-label">Invited Customers</div>
          <div class="kpi-value">${invitedCount}</div>
          <div class="kpi-sub">${pct(invitedCount, totalBookings)}% of bookings</div>
        </div>
        <div class="kpi-card amber fade-in d3">
          <div class="kpi-label">Conquest Customers</div>
          <div class="kpi-value">${conquestCount}</div>
          <div class="kpi-sub">${pct(conquestCount, totalBookings)}% new to brand</div>
        </div>
        <div class="kpi-card red fade-in d4">
          <div class="kpi-label">Part Exchanges</div>
          <div class="kpi-value">${partExCount}</div>
          <div class="kpi-sub">${pct(partExCount, totalBookings)}% with trade-in</div>
        </div>
        <div class="kpi-card blue fade-in d5">
          <div class="kpi-label">Capacity Booked</div>
          <div class="kpi-value">${capacityPct}%</div>
          <div class="kpi-sub">${totalBookings} of ${filteredSlots} slots</div>
        </div>
      </div>

      <!-- Charts Row 1 -->
      <div class="charts-row">
        <!-- Bookings by Site -->
        <div class="card fade-in d2">
          <div class="card-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            Bookings by Site
          </div>
          <div class="bar-chart">
            ${BRANCHES.map(b => `
              <div class="bar-row">
                <div class="bar-label">${shortBranch(b)}</div>
                <div class="bar-track">
                  <div class="bar-fill blue" style="width:${pct(byBranch[b],maxBranch)}%"><span>${byBranch[b]}</span></div>
                </div>
              </div>
            `).join("")}
          </div>
        </div>

        <!-- Vehicle Interest -->
        <div class="card fade-in d3">
          <div class="card-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 17h14M5 17a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1l2-3h8l2 3h1a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2M5 17a2 2 0 1 0 4 0m6 0a2 2 0 1 0 4 0"/></svg>
            Vehicle Interest
          </div>
          <div class="bar-chart">
            ${vehicleSorted.map(([name, cnt]) => `
              <div class="bar-row">
                <div class="bar-label">${name}</div>
                <div class="bar-track">
                  <div class="bar-fill green" style="width:${pct(cnt,maxVehicle)}%"><span>${cnt}</span></div>
                </div>
              </div>
            `).join("") || '<p style="color:var(--mid-grey);font-size:13px">No bookings yet</p>'}
          </div>
        </div>
      </div>

      <!-- Charts Row 2 -->
      <div class="charts-row">
        <!-- Exec Leaderboard -->
        <div class="card fade-in d4">
          <div class="card-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Sales Exec Leaderboard
          </div>
          ${execSorted.map(([name, data], i) => `
            <div class="exec-row">
              <div class="exec-rank ${i < 3 ? 'top' : ''}">${i+1}</div>
              <div class="exec-info">
                <div class="exec-name">${name}</div>
                <div class="exec-branch">${shortBranch(data.branch)}</div>
              </div>
              <div class="exec-count">${data.count}</div>
            </div>
          `).join("") || '<p style="color:var(--mid-grey);font-size:13px">No bookings yet</p>'}
        </div>

        <!-- Capacity by Date -->
        <div class="card fade-in d5">
          <div class="card-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Capacity by Date
          </div>
          <div class="capacity-grid">
            ${Object.entries(byDate).map(([date, d]) => {
              const p = pct(d.booked, d.total);
              const cls = p < 50 ? 'pct-low' : p < 80 ? 'pct-mid' : 'pct-high';
              return `<div class="capacity-cell">
                <div class="capacity-date">${d.label}</div>
                <div class="capacity-pct ${cls}">${p}%</div>
                <div class="capacity-detail">${d.booked} / ${d.total} slots</div>
              </div>`;
            }).join("")}
          </div>
        </div>
      </div>

      <!-- All Bookings Table -->
      <div class="card fade-in d6" style="margin-bottom:40px">
        <div class="card-title" style="justify-content:space-between">
          <span style="display:flex;align-items:center;gap:8px">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
            All Bookings
          </span>
          <span style="font-size:12px;font-weight:600;color:var(--mid-grey)">${bookings.length} records</span>
        </div>
        <div class="table-wrap" style="max-height:500px;overflow-y:auto">
          <table>
            <thead>
              <tr>
                <th>Ref</th><th>Customer</th><th>Branch</th><th>Date</th><th>Time</th>
                <th>Vehicle</th><th>Sales Exec</th><th>Type</th><th>Part Ex</th><th>Phone</th><th>Email</th>
              </tr>
            </thead>
            <tbody>
              ${bookings.map(b => `
                <tr>
                  <td style="font-weight:700;color:var(--accent);font-family:monospace;font-size:12px">${b.booking_ref}</td>
                  <td style="font-weight:600">${b.full_name || (b.title + ' ' + b.first_name + ' ' + b.surname)}</td>
                  <td>${shortBranch(b.branch)}</td>
                  <td>${b.date}</td>
                  <td>${b.time}</td>
                  <td>${b.vehicle}</td>
                  <td>${b.sales_exec}</td>
                  <td><span class="badge ${b.access_mode==='conquest'?'badge-conquest':'badge-invited'}">${b.access_mode==='conquest'?'Conquest':'Invited'}</span></td>
                  <td><span class="badge ${b.part_ex_yn==='Yes'?'badge-yes':'badge-no'}">${b.part_ex_yn}</span></td>
                  <td style="font-size:12px">${b.phone}</td>
                  <td style="font-size:12px">${b.email}</td>
                </tr>
              `).join("") || '<tr><td colspan="11" style="text-align:center;padding:40px;color:var(--mid-grey)">No bookings yet</td></tr>'}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  // Events
  document.getElementById("btn-refresh").addEventListener("click", () => loadData());
  document.getElementById("filter-branch").addEventListener("change", (e) => {
    filterBranch = e.target.value;
    render();
  });
}

// ─── INIT ────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
